name: pipeline

on:
  # Triggered hourly by an external scheduler (cron-job.org) via the REST API,
  # because GitHub's built-in `schedule:` cron proved unreliable. Also runnable
  # manually from the Actions tab.
  workflow_dispatch:

# Let the job push the new snapshot data back to the repo.
permissions:
  contents: write

# Never let two hourly runs overlap and race on the cache / commits.
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      # Cache the sentence-transformers model (~440 MB) so it isn't
      # re-downloaded every hour.
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-BAAI-bge-base-en-v1.5

      # Restore the SQLite DB (article dedupe + hourly thread history) from the
      # most recent previous run. The key is unique per run so a fresh copy is
      # always saved at the end; restore-keys pulls the newest existing cache.
      - name: Restore DB
        uses: actions/cache/restore@v4
        with:
          path: pipeline/news_drift.db
          key: newsdrift-db-${{ github.run_id }}
          restore-keys: |
            newsdrift-db-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        run: python pipeline.py

      # Save the mutated DB under this run's unique key for the next run.
      - name: Save DB
        uses: actions/cache/save@v4
        with:
          path: pipeline/news_drift.db
          key: newsdrift-db-${{ github.run_id }}

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: hourly snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase-and-retry so a concurrent push to main (another run, or a
          # manual push) doesn't fail this job on a non-fast-forward.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts." >&2
          exit 1
